<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Habit - Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Add a New Habit</h1>
    <form id="addHabitForm">
        <label for="habitName">Habit Name:</label>
        <input type="text" id="habitName" required>
        <div id="habitSuggestions"></div>

        <label for="description">Description:</label>
        <textarea id="description"></textarea>

        <label for="currentConfidence">Current Confidence:</label>
        <select id="currentConfidence">
            <option>Beginner</option>
            <option>Intermediate</option>
            <option>Advanced</option>
        </select>

        <label for="targetLevel">Target Level:</label>
        <select id="targetLevel">
            <option>Advanced</option>
            <option>Expert</option>
        </select>

        <label for="feelings">Feelings about starting:</label>
        <select id="feelings">
            <option>Afraid</option>
            <option>Apprehensive</option>
            <option>Neutral</option>
            <option>Hopeful</option>
            <option>Excited</option>
        </select>

        <label for="repetitions">Repetitions to learn:</label>
        <input type="number" id="repetitions" value="20" title="You can modify this value if you want.">

        <button type="submit">Save Habit</button>
    </form>

    <script type="module" src="add-habit.js"></script>
</body>
</html>
